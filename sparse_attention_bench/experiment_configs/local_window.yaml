experiment:
  batch_size: 1
  num_heads: 8
  head_dim: 64
  seq_len: 512
  dtype: fp16
  device: cuda
  mode: prefill
  patterns:
    - type: local_window
      backend: masked_sdpa
      window_size: 128
    - type: local_window
      backend: gather_sparse
      window_size: 128
  num_warmup: 20
  num_iters: 100
